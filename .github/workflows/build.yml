name: GitHell Standardized

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure abyss folder exists
        run: mkdir -p abyss

      - name: Track execution
        id: execution_data
        run: |
          if [ -f abyss/README.yml ]; then
            execution_count=$(grep -oP '(?<=Execution Count: )\d+' abyss/README.yml | tail -1)
            execution_count=$((execution_count + 1))
          else
            execution_count=1
          fi
          echo "execution_count=$execution_count" >> $GITHUB_ENV

      - name: Commit and Push Changes
        run: |
          git config user.name "tadanobutubutu"
          git config user.email "58510538+tadanobutubutu@users.noreply.github.com"
          current_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          commit_id=$(cat /proc/sys/kernel/random/uuid)
          total_commits=$(git rev-list --count HEAD)

          # Co-authors list
          CO_AUTHORS=(
            "Antigravity <antigravity@google.com>"
            "GitHub Copilot <copilot@github.com>"
            "OpenAI Bot <bot@openai.com>"
            "Claude AI <claude@anthropic.com>"
            "DeepSeek <bot@deepseek.com>"
            "Gemini <gemini@google.com>"
            "GitHell Bot <bot@githell.com>"
            "Abyss Dweller <dweller@abyss.com>"
            "Tadanobutubutu-AI <ai@tadanobutubutu.com>"
            "Kusa-Grown-Bot <bot@kusa.jp>"
          )
          RANDOM_CO_AUTHOR=${CO_AUTHORS[$RANDOM % ${#CO_AUTHORS[@]}]}

          echo "  _________.__  __     ___ ___         .__  .__   " > abyss/README.yml
          echo " /  _____/|__|/  |_  /   |   \\   ____ |  | |  |  " >> abyss/README.yml
          echo " /   \\  __ |  \\   __\\/    ~    \\_/ __ \\|  | |  |  " >> abyss/README.yml
          echo " \    \\_\\  \\|  |  |  \\    Y    /\\  ___/|  |_|  |__" >> abyss/README.yml
          echo "  \\______  /|__|__|   \\___|_  /  \\___  >____/____/" >> abyss/README.yml
          echo "         \\/                 \\/       \\/           " >> abyss/README.yml
          echo "--------------------------------------------------" >> abyss/README.yml
          echo "The abyss grows deeper with each commit." >> abyss/README.yml
          echo "--------------------------------------------------" >> abyss/README.yml
          echo "Commit ID: $commit_id" >> abyss/README.yml
          echo "Total Commits in Repo: $total_commits" >> abyss/README.yml
          echo "Execution Count: ${{ env.execution_count }}" >> abyss/README.yml
          echo "Last Execution Time: $current_time" >> abyss/README.yml
          echo "Co-author of the day: $RANDOM_CO_AUTHOR" >> abyss/README.yml
          echo "--------------------------------------------------" >> abyss/README.yml

          git add abyss/README.yml
          
          commit_msg="🚀 The abyss has no bottom... (Total: $total_commits)

Co-authored-by: $RANDOM_CO_AUTHOR"
          
          git commit -m "$commit_msg"
          
          git push
